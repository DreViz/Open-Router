services:
  postgres:
    image: postgres:16
    container_name: openrouter-db
    environment:
      POSTGRES_USER: openrouter
      POSTGRES_PASSWORD: openrouter
      POSTGRES_DB: openrouter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openrouter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
